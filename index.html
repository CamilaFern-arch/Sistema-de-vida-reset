<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reset Your Life ✨</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3039/3039527.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fdfcf9;
            --sage: #8da399;
            --soft-sage: #eef2f0;
            --gold: #c5a880;
            --text: #3d4441;
        }

        /* Limpieza de interfaz GitHub */
        header, #banner, .gh-header, .js-header-wrapper { display: none !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: env(safe-area-inset-top) 20px 100px;
        }

        /* Estética de Lujo */
        .premium-header {
            text-align: center;
            padding: 50px 0 30px;
        }

        .premium-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 34px;
            font-weight: 300;
            font-style: italic;
            color: var(--sage);
            letter-spacing: 1px;
        }

        .quote {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            margin-top: 5px;
            font-weight: 600;
        }

        /* Tarjetas Estilo Boutique */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(141, 163, 153, 0.1);
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--sage);
            margin-bottom: 20px;
            display: block;
            border-left: 2px solid var(--gold);
            padding-left: 10px;
        }

        /* Mood Tracker Luxury */
        .mood-grid {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
        }

        .mood-item {
            font-size: 26px;
            filter: grayscale(100%);
            opacity: 0.3;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .mood-item.active {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.3);
        }

        /* Habit Tracker Minimal */
        .habit-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .habit-name { flex: 1; font-size: 14px; font-weight: 300; }

        .dots-group { display: flex; gap: 6px; }

        .habit-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid var(--soft-sage);
            transition: 0.3s;
        }

        .habit-dot.checked {
            background-color: var(--sage);
            border-color: var(--sage);
            box-shadow: 0 0 10px rgba(141, 163, 153, 0.3);
        }

        /* Finanzas Elegantes */
        .finance-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 15px;
        }

        .fin-input-group {
            flex: 1;
            background: var(--soft-sage);
            padding: 12px;
            border-radius: 15px;
            text-align: center;
        }

        .fin-input-group label { font-size: 9px; display: block; margin-bottom: 5px; opacity: 0.6; }

        .fin-input-group input {
            width: 100%;
            background: transparent;
            border: none;
            text-align: center;
            font-size: 16px;
            font-family: inherit;
            font-weight: 600;
            color: var(--text);
            outline: none;
        }

        .balance-display {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--soft-sage);
        }

        .balance-amount {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--sage);
        }

        /* Botón de Guardado Gold */
        .save-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: var(--sage);
            color: white;
            padding: 18px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 2px;
            box-shadow: 0 15px 30px rgba(141, 163, 153, 0.3);
            cursor: pointer;
        }

        .save-button:active { transform: translateX(-50%) scale(0.96); }

    </style>
</head>
<body>

    <div class="premium-header">
        <h1>Reset Your Life</h1>
        <div class="quote">Soft Productivity</div>
    </div>

    <div class="glass-card">
        <span class="section-label">Estado de Ánimo</span>
        <div class="mood-grid">
            <span class="mood-item" onclick="selectMood(this)">🌿</span>
            <span class="mood-item" onclick="selectMood(this)">☁️</span>
            <span class="mood-item" onclick="selectMood(this)">✨</span>
            <span class="mood-item" onclick="selectMood(this)">🌙</span>
            <span class="mood-item" onclick="selectMood(this)">☀️</span>
        </div>
    </div>

    <div class="glass-card">
        <span class="section-label">Hábitos de Bienestar</span>
        <div id="habit-list">
            </div>
    </div>

    <div class="glass-card">
        <span class="section-label">Balance Consciente</span>
        <div class="finance-row">
            <div class="fin-input-group">
                <label>Ingresos</label>
                <input type="number" id="in-val" value="0" oninput="updateBalance()">
            </div>
            <div class="fin-input-group">
                <label>Gastos</label>
                <input type="number" id="ex-val" value="0" oninput="updateBalance()">
            </div>
        </div>
        <div class="balance-display">
            <label style="font-size: 10px; letter-spacing: 1px;">DISPONIBLE</label>
            <div class="balance-amount" id="total-bal">$0.00</div>
        </div>
    </div>

    <button class="save-button" onclick="saveExperience()">GUARDAR PROGRESO</button>

    <script>
        // Configuración de Hábitos (Personaliza estos nombres si quieres)
        const myHabits = ["Lectura Consciente", "Movimiento Suave", "Hidratación", "Momentos de Paz"];
        const listContainer = document.getElementById('habit-list');

        myHabits.forEach(name => {
            const div = document.createElement('div');
            div.className = 'habit-item';
            div.innerHTML = `
                <span class="habit-name">${name}</span>
                <div class="dots-group">
                    ${Array(7).fill().map(() => `<div class="habit-dot" onclick="this.classList.toggle('checked')"></div>`).join('')}
                </div>
            `;
            listContainer.appendChild(div);
        });

        function selectMood(el) {
            document.querySelectorAll('.mood-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function updateBalance() {
            const inc = parseFloat(document.getElementById('in-val').value) || 0;
            const exp = parseFloat(document.getElementById('ex-val').value) || 0;
            document.getElementById('total-bal').innerText = `$${(inc - exp).toLocaleString()}`;
        }

        function saveExperience() {
            // Animación simple de feedback
            const btn = document.querySelector('.save-button');
            const originalText = btn.innerText;
            btn.innerText = "PROGRESO GUARDADO ✨";
            btn.style.background = "#c5a880";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#8da399";
            }, 2000);
        }
    </style>
</body>
</html>
