<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reset Your Life — Soft Planner</title>

<link rel="icon" type="image/png" href="https://img.icons8.com/ios/150/8a9e85/leaf.png?v=2">
<link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/250/8a9e85/leaf.png?v=2">

<meta name="apple-mobile-web-app-title" content="Reset">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f0ece3">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f0ece3;
    --cream-dark: #e6e0d4;
    --stone: #b8b0a2;
    --text: #2d2926;
    --text-light: #7a7268;
    --accent: #8a9e85;
    --card-bg: #ece8df;
    --white: #faf8f4;
    --danger: #b07070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* –– NAVEGACIÓN –– */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--white);
    border-bottom: 1px solid var(--cream-dark);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 60px;
    z-index: 100;
  }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  
  /* Icono de hoja en el nav */
  .logo-svg { width: 22px; height: 22px; }
  
  .nav-tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    padding: 6px 12px; border-radius: 20px;
    font-family: 'Jost', sans-serif; font-size: 0.8rem;
    color: var(--text-light); white-space: nowrap;
  }
  .tab-btn.active { background: var(--accent); color: white; }

  /* –– CONTENIDO –– */
  main { max-width: 800px; margin: 0 auto; padding: 80px 20px 40px; }
  .page { display: none; animation: fadeIn 0.4s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .section-header { margin-bottom: 25px; border-bottom: 1px solid var(--stone); padding-bottom: 8px; }
  .section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; }

  .card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; }

  input, textarea {
    width: 100%; background: transparent; border: none;
    border-bottom: 1.5px solid var(--stone); padding: 8px 0;
    font-family: 'Jost', sans-serif; font-size: 1rem; color: var(--text); outline: none;
  }
  input:focus, textarea:focus { border-bottom-color: var(--accent); }

  .table-wrapper { overflow-x: auto; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; min-width: 400px; }
  th { font-size: 0.75rem; color: var(--text-light); text-align: left; padding: 8px; }
  td { padding: 5px; border-bottom: 1px solid var(--cream-dark); }

  .day-cell { 
    width: 30px; height: 30px; border: 1px solid var(--stone); 
    border-radius: 4px; cursor: pointer; text-align: center;
  }
  .day-cell.checked { background: var(--accent); position: relative; }
  .day-cell.checked::after { content: '✓'; color: white; font-size: 0.8rem; }

  .btn-container { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .primary-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; }
  .add-btn { background: none; border: 1px dashed var(--stone); padding: 10px; width: 100%; border-radius: 10px; color: var(--text-light); cursor: pointer; margin-top: 10px; }

  .balance-card { display: flex; justify-content: space-between; font-weight: 500; margin-top: 10px; font-size: 1.1rem; }
  .save-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: white; padding: 8px 20px; border-radius: 20px;
    font-size: 0.8rem; opacity: 0; transition: 0.3s; pointer-events: none;
  }
  .save-toast.show { opacity: 1; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <img src="https://img.icons8.com/ios/50/8a9e85/leaf.png" class="logo-svg" alt="Hoja">
    Reset
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="goTo('cover',this)">Inicio</button>
    <button class="tab-btn" onclick="goTo('status',this)">Estado</button>
    <button class="tab-btn" onclick="goTo('habits',this)">Hábitos</button>
    <button class="tab-btn" onclick="goTo('weekly',this)">Semana</button>
    <button class="tab-btn" onclick="goTo('finance',this)">Finanzas</button>
  </div>
</nav>

<main>
  <section class="page active" id="cover">
    <div style="text-align: center; padding: 40px 0;">
      <img src="https://img.icons8.com/ios/150/8a9e85/leaf.png" style="width: 80px; height: 80px; margin-bottom: 15px;" alt="Reset Your Life">
      <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem;">Reset Your Life</h1>
      <p style="font-style: italic; color: var(--text-light);">Tu refugio digital de paz.</p>
      <div class="card" style="margin-top: 30px; text-align: left;">
        <p>Este es tu espacio seguro. Úsalo para organizar tu mente, soltar el estrés y planear con intención.</p>
      </div>
      <button class="primary-btn" onclick="document.querySelectorAll('.tab-btn')[1].click()">Empezar revisión →</button>
    </div>
  </section>

  <section class="page" id="status">
    <div class="section-header"><h2>¿Cómo va todo?</h2></div>
    <div class="card"><label>¿Cómo te sientes en este momento?</label><textarea data-key="st_feel"></textarea></div>
    <div class="card"><label>¿Qué te está causando estrés?</label><textarea data-key="st_stress"></textarea></div>
  </section>

  <section class="page" id="habits">
    <div class="section-header"><h2>Rastreador de Hábitos</h2></div>
    <div class="table-wrapper"><table><thead><tr id="hHead"></tr></thead><tbody id="hBody"></tbody></table></div>
    <button class="add-btn" onclick="addHabit()">+ Nuevo Hábito</button>
  </section>

  <section class="page" id="weekly">
    <div class="section-header"><h2>Plan Semanal</h2></div>
    <div id="weekContainer"></div>
  </section>

  <section class="page" id="finance">
    <div class="section-header"><h2>Finanzas del Mes</h2></div>
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Concepto</th><th style="width:80px">Ingreso</th><th style="width:80px">Gasto</th><th style="width:40px"></th></tr></thead>
          <tbody id="fBody"></tbody>
        </table>
      </div>
      <button class="add-btn" onclick="addFinRow()">+ Agregar línea</button>
    </div>
    <div class="card" style="background: var(--white);"><div class="balance-card"><span>Balance Total:</span><span id="totalBalance">$0.00</span></div></div>
  </section>
</main>

<div class="save-toast" id="toast">Cambios guardados</div>

<script>
// Lógica de funcionamiento (Mantiene tu sistema de persistencia actual)
const save = (k, v) => {
    localStorage.setItem('ryl_' + k, JSON.stringify(v));
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(window.tTimer);
    window.tTimer = setTimeout(() => t.classList.remove('show'), 1500);
};
const load = (k, def) => JSON.parse(localStorage.getItem('ryl_' + k)) || def;

function goTo(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    window.scrollTo(0,0);
}

let habits = load('h_list', ['Beber agua', 'Meditar']);
function renderHabits() {
    const head = document.getElementById('hHead');
    const body = document.getElementById('hBody');
    head.innerHTML = '<th>Hábito</th>' + Array.from({length:7}, (_,i)=>`<th>${i+1}</th>`).join('');
    body.innerHTML = '';
    habits.forEach((h, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" value="${h}" onchange="updateHName(${i}, this.value)"></td>`;
        for(let d=1; d<=7; d++) {
            const checked = load(`h_${i}_${d}`, false);
            const td = document.createElement('td');
            td.className = `day-cell ${checked ? 'checked' : ''}`;
            td.onclick = () => { td.classList.toggle('checked'); save(`h_${i}_${d}`, td.classList.contains('checked')); };
            tr.appendChild(td);
        }
        body.appendChild(tr);
    });
}
function updateHName(i, v) { habits[i] = v; save('h_list', habits); }
function addHabit() { habits.push('Nuevo'); save('h_list', habits); renderHabits(); }

let finData = load('f_data', [{desc: '', inc: '', exp: ''}]);
function renderFinance() {
    const body = document.getElementById('fBody');
    body.innerHTML = '';
    finData.forEach((row, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" value="${row.desc}" oninput="updateFinData(${i}, 'desc', this.value)"></td>
            <td><input type="number" value="${row.inc}" placeholder="0" oninput="updateFinData(${i}, 'inc', this.value)"></td>
            <td><input type="number" value="${row.exp}" placeholder="0" oninput="updateFinData(${i}, 'exp', this.value)"></td>
            <td><button onclick="delFin(${i})" style="background:none; border:none; color:var(--danger);">✕</button></td>
        `;
        body.appendChild(tr);
    });
    calcTotal();
}
function updateFinData(i, field, val) { finData[i][field] = val; localStorage.setItem('ryl_f_data', JSON.stringify(finData)); calcTotal(); }
function calcTotal() {
    const total = finData.reduce((acc, r) => acc + (Number(r.inc)||0) - (Number(r.exp)||0), 0);
    const el = document.getElementById('totalBalance');
    el.innerText = `$${total.toFixed(2)}`;
    el.style.color = total >= 0 ? 'var(--accent)' : 'var(--danger)';
}
function addFinRow() { finData.push({desc:'', inc:'', exp:''}); renderFinance(); }
function delFin(i) { finData.splice(i, 1); save('f_data', finData); renderFinance(); }

const days = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
function buildWeek() {
    const container = document.getElementById('weekContainer');
    days.forEach(d => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<label style="font-weight:500;">${d}</label><textarea data-key="wk_${d}"></textarea>`;
        container.appendChild(div);
    });
}

document.addEventListener('DOMContentLoaded', () => {
    buildWeek();
    renderHabits();
    renderFinance();
    document.querySelectorAll('[data-key]').forEach(el => {
        el.value = load(el.dataset.key, '');
        el.addEventListener('input', () => save(el.dataset.key, el.value));
    });
});
</script>
</body>
</html>
